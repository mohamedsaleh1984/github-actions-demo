name: Node.js CI

on: [push]

jobs:
  build:
    runs-on: ubunntu-latest

  steps:
    - uses: action/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
    - name: Install depedencies
      run: npm install
    - name: Run test
      run: npm test
      